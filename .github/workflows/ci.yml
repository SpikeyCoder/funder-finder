name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm ci --include=optional
      - name: Audit high/critical advisories (informational)
        run: npm audit --omit=dev --audit-level=high || echo "::warning::npm audit found high/critical advisories; review before merging"
      - run: npm run build
      - name: Verify static prerender coverage
        # Asserts the built dist/<route>/index.html pages carry real crawler-
        # visible content (h1, meta, canonical, OG, JSON-LD, body copy).
        # Pure Node + jsdom — no headless browser needed in CI.
        run: npm test
