name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Delete lockfile before install so npm resolves platform-specific optional
      # deps (e.g. @rollup/rollup-linux-x64-gnu) correctly on the CI runner.
      # The lockfile is committed for Dependabot scanning but intentionally
      # skipped here to avoid cross-platform ARM/x64 mismatch issues.
      - run: rm -f package-lock.json && npm install
      - run: npm run build
      # SPA routing fix: serve the full app for any 404 so React Router
      # handles client-side routes (replaces the redirect-hack 404.html).
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
