name: Weekly Supply Chain Audit

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm-audit
        continue-on-error: true
        run: |
          npm audit --audit-level=moderate 2>&1 | tee /tmp/npm-audit.txt

      - name: Create issue on failure
        if: steps.npm-audit.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            let body = '## Weekly Supply Chain Audit — Node.js Vulnerabilities Found\n\n';
            body += `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;
            body += `**Date:** ${new Date().toISOString().slice(0, 10)}\n\n`;

            try {
              const report = fs.readFileSync('/tmp/npm-audit.txt', 'utf8');
              body += '### npm audit results\n```\n' + report.slice(0, 3000) + '\n```\n\n';
            } catch (e) {
              body += '_Could not read audit output._\n';
            }

            body += '### Next steps\n';
            body += '1. Review the vulnerabilities listed above\n';
            body += '2. Run `npm audit fix` or update affected packages\n';
            body += '3. Re-run this workflow to verify the fix\n';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Supply Chain Vulnerabilities (npm) — ${new Date().toISOString().slice(0, 10)}`,
              body: body,
              labels: ['security', 'supply-chain']
            });

      - name: Fail workflow if vulnerabilities found
        if: steps.npm-audit.outcome == 'failure'
        run: |
          echo "❌ npm supply chain vulnerabilities detected. See created issue."
          exit 1
