<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Non-Profit Funder Finder — Free AI Funder Matching for 501(c)(3)s</title>
    <meta name="description" content="Find foundations, DAFs, and corporate giving programs aligned to your nonprofit's mission in seconds. Free AI-powered funder matching — no account required." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fundermatch.org/" />
    <meta property="og:title" content="Non-Profit Funder Finder — Free AI Funder Matching" />
    <meta property="og:description" content="Find foundations, DAFs, and corporate giving programs aligned to your nonprofit's mission in seconds. Free — no account, no credit card, no setup." />
    <meta property="og:image" content="https://fundermatch.org/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Non-Profit Funder Finder — Free AI Funder Matching" />
    <meta name="twitter:description" content="Find foundations, DAFs, and corporate giving programs aligned to your nonprofit's mission in seconds. Free — no account required." />
    <meta name="twitter:image" content="https://fundermatch.org/og-image.png" />
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
