<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="icon" type="image/png" href="/favicon-48x48.png" sizes="48x48" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Resource hints: warm critical third-party connections (FM-146)
         to improve LCP / INP. dns-prefetch is a graceful fallback for
         browsers that ignore preconnect for non-CORS requests. -->
    <link rel="preconnect" href="https://tgtotjvdubhjxzybmdex.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://tgtotjvdubhjxzybmdex.supabase.co" />
    <link rel="preconnect" href="https://fundermatch.goatcounter.com" />
    <link rel="dns-prefetch" href="https://fundermatch.goatcounter.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Content Security Policy (delivered via meta tag — GitHub Pages cannot set HTTP headers).
      Limitations of meta-tag CSP: frame-ancestors and report-uri are not supported here.
      For clickjacking protection see the X-Frame-Options note in SECURITY.md.

      script-src:
        'self'             – Vite-bundled JS (dist/assets/index-*.js)
        gc.zgo.at          – GoatCounter analytics script

        Note: the former 'sha256-…' allowance covered the inline GitHub
        Pages SPA-routing decoder script, which was removed when legacy
        /?/path URL restoration moved into public/_worker.js (301s).

        Note: axe-core is a dev-only dependency invoked via @axe-core/cli
        (see package.json devDependencies); it is never loaded by the
        production bundle, so the previous cdn.jsdelivr.net /
        cdnjs.cloudflare.com allowances have been dropped to keep CSP tight.

      style-src:
        'self'             – Tailwind CSS bundle
        'unsafe-inline'    – Tailwind utility classes applied as inline styles by React

      connect-src:
        *.supabase.co      – Supabase REST API, Auth (OAuth), and Edge Functions
        accounts.google.com – Google OAuth token exchange
        fundermatch.goatcounter.com – GoatCounter beacon

      img-src data:        – SVG data URIs used by Lucide icons
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://gc.zgo.at; style-src 'self' 'unsafe-inline'; connect-src 'self' https://tgtotjvdubhjxzybmdex.supabase.co https://accounts.google.com https://fundermatch.goatcounter.com; img-src 'self' data: https:; font-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self' https://tgtotjvdubhjxzybmdex.supabase.co; object-src 'none';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Mobile browser UI + dark-mode hint (FM usability audit 2026-05-25) -->
    <meta name="theme-color" content="#0d1117" />
    <meta name="color-scheme" content="dark light" />
    <title>Find Grants for Nonprofits — Free Grant Search | FunderMatch</title>
    <meta name="description" content="Find nonprofit funding opportunities matched to your mission. Search 460,000+ foundations and grants for 501(c)(3) nonprofits. Free AI-powered grant matching — no account required." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fundermatch.org/" />
    <meta property="og:title" content="Find Grants for Nonprofits — Free Grant Search | FunderMatch" />
    <meta property="og:description" content="Find nonprofit funding opportunities matched to your mission. Search 460,000+ foundations and grants for 501(c)(3) nonprofits. Free AI-powered grant matching — no account required." />
    <meta property="og:image" content="https://fundermatch.org/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Find Grants for Nonprofits — Free Grant Search | FunderMatch" />
    <meta name="twitter:description" content="Find nonprofit funding opportunities matched to your mission. Search 460,000+ foundations and grants for 501(c)(3) nonprofits. Free AI-powered grant matching — no account required." />
    <meta name="twitter:image" content="https://fundermatch.org/og-image.png" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="BV6XNr6ev9mMAwmpuczFNBOX9ODTTrtbxuC96R6sLvM" />

    <!-- Canonical (self-referential, homepage).
         This static tag backs the "/" route for no-JS crawlers, which never run
         CanonicalTag. On the client, src/components/CanonicalTag.tsx UPDATES this
         same canonical link in place (it looks up the existing one before
         creating a node), so the page is never left with two canonicals.
         The prerender plugin (scripts/vite-plugin-prerender.mjs) likewise
         overwrites this href per prerendered subpage (/mission, /search, ...).
         index.html also backs the SPA fallback, but unknown URLs are served as
         real 404s (public/_worker.js) and the registered fallback routes are
         excluded from the sitemap, bounding any "duplicate of home" exposure. -->
    <link rel="canonical" href="https://fundermatch.org/" />

    <!-- Structured data — WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FunderMatch",
      "url": "https://fundermatch.org",
      "description": "Find nonprofit funding opportunities and grants for 501(c)(3) organizations. Free AI-powered nonprofit grant matching across 460,000+ foundations, DAFs, and corporate giving programs.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "audience": {
        "@type": "Audience",
        "audienceType": "Nonprofit Organizations, 501(c)(3)s"
      },
      "featureList": [
        "AI-powered funder matching",
        "Grant application draft generation",
        "Funder pipeline tracking",
        "Contact information lookup"
      ]
    }
    </script>

    <!-- Structured data — Organization (FM-146) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FunderMatch",
      "url": "https://fundermatch.org",
      "logo": "https://fundermatch.org/favicon-512.png",
      "description": "Free AI-powered funder matching and grant writing tool for 501(c)(3) nonprofits."
    }
    </script>

    <!-- Structured data — FAQPage (FM-146) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is FunderMatch free for nonprofits?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. FunderMatch is free to use, no account or credit card required to start searching for funders aligned to your mission."
          }
        },
        {
          "@type": "Question",
          "name": "What data powers FunderMatch?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FunderMatch indexes public IRS Form 990 filings to surface foundations, donor-advised funds (DAFs), and corporate giving programs that align with each nonprofit's mission and geography."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account to find funders?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. You can describe your mission and receive ranked funder matches without creating an account. An account is only needed to save funders, track outreach, or generate grant drafts."
          }
        },
        {
          "@type": "Question",
          "name": "Does FunderMatch generate grant application drafts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The AI Grant Writer generates a tailored draft with a funder-fit score and compliance checklist based on your mission and the funder's stated priorities."
          }
        }
      ]
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <!--
      Intentional SPA no-JS fallback — this is EXPECTED, not a defect. Do not
      flag it as "JS-dependent / SSR unconfirmed". fundermatch.org is a
      client-rendered SPA whose PUBLIC routes (/, /mission, /search, /privacy,
      /terms, /contact) are statically PRERENDERED: their real content is baked
      into the raw HTML at build time (see prerender/README.md and
      scripts/vite-plugin-prerender.mjs), so no-JS crawlers and LLM agents get
      full page content rather than this notice. The interactive product (grant
      search, results, pipeline) genuinely requires JavaScript, so this
      <noscript> ships ON PURPOSE as a graceful message for visitors who have JS
      disabled. It is by design; usability/security audits should not treat it
      as missing SSR. -->
    <noscript>
      <div style="max-width:42rem;margin:4rem auto;padding:0 1.25rem;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#e6edf3;text-align:center;line-height:1.6">
        <h1 style="font-size:1.4rem;margin-bottom:.5rem">JavaScript is required</h1>
        <p>FunderMatch needs JavaScript to search foundations and match grants to your mission. Please enable JavaScript in your browser settings, then reload this page.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
