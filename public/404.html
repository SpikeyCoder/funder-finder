<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FunderMatch</title>
  <script type="text/javascript">
    // GitHub Pages SPA redirect: encode the path into a query parameter
    // and redirect to root, where index.html will decode and restore it.
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
