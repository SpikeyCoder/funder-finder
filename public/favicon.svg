<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0d1117"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#glow)"/>
  <!-- Monogram clipped to rounded square -->
  <g clip-path="url(#clip)" font-family="system-ui,-apple-system,&#39;Helvetica Neue&#39;,Arial,sans-serif"
     font-weight="800" font-size="236" dominant-baseline="central" text-anchor="middle">
    <text x="138" y="248" fill="#f0f6fc">F</text>
    <text x="374" y="248" fill="#3b82f6">M</text>
  </g>
  <!-- Accent bar -->
  <rect x="88" y="395" width="336" height="24" rx="12" fill="#3b82f6"/>
</svg>